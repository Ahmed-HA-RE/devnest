<svg width="460" height="120" viewBox="0 0 460 120" xmlns="http://www.w3.org/2000/svg">
  <title>DevNest logo</title>
  <desc>DevNest logo — three stacked database layers with wordmark.</desc>

  <!-- Icon mark -->
  <ellipse cx="52" cy="88" rx="46" ry="12" fill="#1E3A8A"/>
  <rect x="6" y="76" width="92" height="13" fill="#1E3A8A"/>
  <ellipse cx="52" cy="76" rx="46" ry="12" fill="#1D4ED8"/>

  <ellipse cx="52" cy="60" rx="38" ry="10" fill="#1E3A8A"/>
  <rect x="14" y="50" width="76" height="12" fill="#1D4ED8"/>
  <ellipse cx="52" cy="50" rx="38" ry="10" fill="#2563EB"/>

  <ellipse cx="52" cy="36" rx="30" ry="8" fill="#1D4ED8"/>
  <rect x="22" y="28" width="60" height="10" fill="#2563EB"/>
  <ellipse cx="52" cy="28" rx="30" ry="8" fill="#3B82F6"/>

  <ellipse cx="44" cy="27" rx="12" ry="3.5" fill="#93C5FD" opacity="0.4"/>

  <!-- Wordmark as one text element — Dev dark, Nest light -->
  <text x="116" y="74"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="52"
    font-weight="700">
    <tspan fill="#3B82F6">Dev</tspan><tspan fill="#60A5FA">Nest</tspan>
  </text>

</svg>
